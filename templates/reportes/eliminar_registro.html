{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h2>Eliminar registro de actividad</h2>
    <p>Confirma si deseas eliminar este registro del historial.</p>
</div>

<div class="content-card delete-card">
    <h4 class="mb-3">¿Eliminar registro?</h4>

    <p>
        Estás a punto de eliminar el registro:
        <strong>{{ registro.descripcion }}</strong>
    </p>

    <form method="post">
        {% csrf_token %}
        <div class="form-actions justify-content-center">
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'historial_actividad' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

{% endblock %}
